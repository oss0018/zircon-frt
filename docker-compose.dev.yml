version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - uploaded_files:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://zircon:zircon_dev_password@postgres:5432/zircon}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev-encryption-key-32-bytes-long!}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=debug --concurrency=2
    volumes:
      - ./backend:/app
      - uploaded_files:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000

  postgres:
    ports:
      - "5432:5432"

  elasticsearch:
    ports:
      - "9200:9200"

  redis:
    ports:
      - "6379:6379"
